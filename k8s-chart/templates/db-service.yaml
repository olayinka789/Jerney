apiVersion: v1
kind: Service
metadata:
  name: jerney-db
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: jerney-db
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: database
spec:
  type: {{ .Values.database.service.type }}
  selector:
    app.kubernetes.io/name: jerney-db
  ports:
    - port: {{ .Values.database.service.port }}
      targetPort: 5432
      protocol: TCP
