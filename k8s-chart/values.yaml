# Default values for jerney.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace: jerney

database:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    storageClass: managed-csi
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  secret:
    POSTGRES_USER: amVybmV5X3VzZXI=
    POSTGRES_PASSWORD: amVybmV5X3Bhc3NfMjAyNg==
    POSTGRES_DB: amVybmV5X2Ri

backend:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/iam-veeramalla/jerney/jerney-backend
    tag: "75da1da"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/iam-veeramalla/jerney/jerney-frontend
    tag: "75da1da"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Global settings
networkPolicies:
  enabled: true

storageClass:
  enabled: false
