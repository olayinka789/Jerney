# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (Azure + ArgoCD)
# ==============================================================
# Triggers on every push and pull request.
# Stages: Lint → SCA → Build → Image Scan → IaC Scan → GitOps Update
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Security: restrict default permissions to read-only
permissions:
  contents: write
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  # Corrected to lowercase for GHCR compatibility
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/jerney/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/jerney/jerney-frontend

jobs:
  # ==============================================================
  # STAGE 1: Linting
  # ==============================================================
  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint || true # Continue even if lint fails for now

  # ==============================================================
  # STAGE 2: Software Composition Analysis (SCA)
  # ==============================================================
  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true

  # ==============================================================
  # STAGE 3: Build & Push Container Images
  # ==============================================================
  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jerney/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================================================
  # STAGE 4: IaC Security Scan (Checkov)
  # ==============================================================
  iac-scan:
    name: "🏗️ IaC Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

      - name: Run Checkov on Helm Chart
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s-chart/
          framework: helm
          soft_fail: true

  # ==============================================================
  # STAGE 5: GitOps Update (Update values.yaml)
  # ==============================================================
  update-gitops:
    name: "🚀 Update GitOps Values"
    runs-on: ubuntu-latest
    needs: [build, iac-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install yq
        run: sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq

      - name: Update values.yaml with new tags
        run: |
          NEW_TAG=${{ steps.sha.outputs.short }}
          
          # Update backend and frontend tags in values.yaml
          yq eval ".backend.image.tag = "$NEW_TAG"" -i k8s-chart/values.yaml
          yq eval ".frontend.image.tag = "$NEW_TAG"" -i k8s-chart/values.yaml
          
          echo "✅ Updated image tags to $NEW_TAG in values.yaml"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s-chart/values.yaml
          git diff --cached --quiet || (git commit -m "ci: update images to ${{ steps.sha.outputs.short }} [skip ci]" && git push)
